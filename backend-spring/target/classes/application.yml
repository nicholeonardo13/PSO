server:
  port: 4000

spring:
  datasource:
    # Support both JDBC_DATABASE_URL and constructed URL from components
    # In Docker, set JDBC_DATABASE_URL=jdbc:postgresql://postgres:5432/pso_db
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/pso_db}
    username: ${DATABASE_USERNAME:pso_user}
    password: ${DATABASE_PASSWORD:pso_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

app:
  jwt:
    secret: ${JWT_SECRET:pso_super_secret_jwt_key_change_in_production_must_be_at_least_32_chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.pso.backoffice: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
