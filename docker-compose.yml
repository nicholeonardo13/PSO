version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pso_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pso_db
      POSTGRES_USER: pso_user
      POSTGRES_PASSWORD: pso_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pso_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://pso_user:pso_password@postgres:5432/pso_db
      JWT_SECRET: pso_super_secret_jwt_key_change_in_production
      PORT: 4000
      NODE_ENV: development
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pso_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
